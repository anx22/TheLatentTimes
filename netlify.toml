# Netlify build configuration for The Latent Times.
#
# The frontend reads import.meta.env.VITE_CONVEX_URL at build time (see index.tsx)
# and has no fallback — if it is missing the site renders a "System Configuration
# Error" screen. VITE_CONVEX_URL is provided as a Netlify build env var
# (https://adamant-mastiff-745.convex.cloud) rather than hardcoded here.
#
# NOTE: we intentionally do NOT run `convex deploy` during the Netlify build.
# The Convex backend is deployed separately (via `npx convex deploy`/`dev` with a
# proper key); wiring it into the static-site build failed because the available
# key is a dev key. Keep the frontend build pure.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so client-side routing / deep links resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
